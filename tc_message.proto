syntax = "proto3";

package tc;

enum MessageType {
  kHello = 0;
  kAck = 1;
  kHeartBeat = 2;
  kVideoFrame = 3;
  kAudioFrame = 4;
}

enum VideoType {
  kNetH264 = 0;
  kNetHevc = 1;
  kNetVp9 = 2;
}

message Ack {
  MessageType type = 1;
  uint64 send_time = 2;
}

message Hello {

}

message HeartBeat {

}

message VideoFrame {
  VideoType type = 1;
  bytes data = 2;
  uint64 frame_index = 3;
  bool key = 4;
  int32 frame_width = 5;
  int32 frame_height = 6;
}

message AudioFrame {
  int32 samples = 1;
  int32 channels = 2;
  bytes data = 3;
}

message Message {
  MessageType type = 1;
  uint64 send_time = 2;
  Hello hello = 3;
  Ack ack = 4;
  HeartBeat heart_beat = 5;
  VideoFrame video_frame = 6;
  AudioFrame audio_frame = 7;
}
