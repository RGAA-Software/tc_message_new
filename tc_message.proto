syntax = "proto3";

package tc;

enum MessageType {
  kHello = 0;
  kAck = 1;
  kHeartBeat = 2;
  kVideoFrame = 3;
  kAudioFrame = 4;
  kKeyEvent = 5;
}

enum VideoType {
  kNetH264 = 0;
  kNetHevc = 1;
  kNetVp9 = 2;
}

message Ack {
  MessageType type = 1;
  uint64 send_time = 2;
}

message Hello {

}

message HeartBeat {

}

message VideoFrame {
  VideoType type = 1;
  bytes data = 2;
  uint64 frame_index = 3;
  bool key = 4;
  int32 frame_width = 5;
  int32 frame_height = 6;
}

message AudioFrame {
  int32 samples = 1;
  int32 channels = 2;
  bytes data = 3;
}

message KeyEvent
{
	enum LockKeyStatusCheck {
		kDontCareLockKey = 0;
		kCheckNumLock = 1;
		kCheckCapsLock = 2;
	}

	// 虚拟键盘码,参考msdn文档的虚拟键码表: https://docs.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
    uint32 key_code = 1;

	// 按下还是松开
    bool down = 2;

	// 按键当前的状态 GetKeyState()获取
	int32  num_lock_status =3;

	int32  caps_lock_status = 4;

	LockKeyStatusCheck status_check = 5;

	// 当前毫秒值时间戳
	int64 timestamp = 6;
}

message Message {
  MessageType type = 1;
  uint64 send_time = 2;
  Hello hello = 3;
  Ack ack = 4;
  HeartBeat heart_beat = 5;
  VideoFrame video_frame = 6;
  AudioFrame audio_frame = 7;
  KeyEvent key_event = 8;
}
